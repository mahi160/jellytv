<!DOCTYPE html>
<html lang="en">
<head>
    <title>Broadcast</title>
</head>
<body>
    <div id="BroadcastConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <div class="verticalSection">
                    <h2>Watch</h2>
                    <p>Paste these into Jellyfin's own Live TV setup to add this channel with a guide.
                        Replace <code>YOUR_API_KEY</code> in each URL with a dedicated key from
                        Dashboard &gt; API Keys &mdash; don't use your personal login, it stops working when you log out.</p>
                    <div class="inputContainer">
                        <label class="inputLabel" for="M3uUrl">M3U Playlist URL (Live TV &rarr; Tuner Devices &rarr; M3U Tuner)</label>
                        <input is="emby-input" type="text" id="M3uUrl" readonly="readonly" />
                        <button is="emby-button" type="button" class="raised mini copyUrlButton" data-target="M3uUrl">
                            <span>Copy</span>
                        </button>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="XmlTvUrl">XMLTV Guide URL (Live TV &rarr; Guide Data Providers &rarr; XMLTV)</label>
                        <input is="emby-input" type="text" id="XmlTvUrl" readonly="readonly" />
                        <button is="emby-button" type="button" class="raised mini copyUrlButton" data-target="XmlTvUrl">
                            <span>Copy</span>
                        </button>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel" for="StreamUrl">Direct Stream URL (paste into VLC/any IPTV player)</label>
                        <input is="emby-input" type="text" id="StreamUrl" readonly="readonly" />
                        <button is="emby-button" type="button" class="raised mini copyUrlButton" data-target="StreamUrl">
                            <span>Copy</span>
                        </button>
                    </div>
                </div>

                <div class="verticalSection">
                    <h2>Actions</h2>
                    <button is="emby-button" type="button" id="RegenerateButton" class="raised block emby-button">
                        <span>Regenerate Schedule Now</span>
                    </button>
                    <div id="RegenerateStatus"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        (function () {
            var page = document.querySelector('#BroadcastConfigPage');

            function renderWatchUrls() {
                // Deliberately NOT ApiClient.accessToken(): that's the admin's personal session token —
                // pasted into an IPTV player it grants full admin API access and stops working on logout.
                var placeholder = 'YOUR_API_KEY';
                page.querySelector('#M3uUrl').value = ApiClient.getUrl('Broadcast/m3u', { api_key: placeholder });
                page.querySelector('#XmlTvUrl').value = ApiClient.getUrl('Broadcast/xmltv', { api_key: placeholder });
                page.querySelector('#StreamUrl').value = ApiClient.getUrl('Broadcast/Channel/Stream', { api_key: placeholder });
            }

            page.addEventListener('pageshow', function () {
                renderWatchUrls();
                page.querySelector('#RegenerateStatus').textContent = '';
            });

            page.querySelectorAll('.copyUrlButton').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var input = page.querySelector('#' + btn.getAttribute('data-target'));
                    navigator.clipboard.writeText(input.value);
                });
            });

            page.querySelector('#RegenerateButton').addEventListener('click', function () {
                var status = page.querySelector('#RegenerateStatus');
                status.textContent = 'Regenerating...';
                ApiClient.ajax({
                    type: 'POST',
                    url: ApiClient.getUrl('Broadcast/Channel/Regenerate')
                }).then(function () {
                    status.textContent = 'Schedule regenerated.';
                }, function () {
                    status.textContent = 'Regeneration failed \u2014 check server logs.';
                });
            });
        })();
    </script>
</body>
</html>
