changelog: >
  V1 simplification: the config page no longer exposes Channel settings or a Programming Block editor
  -- ships with a single default "All Day Movies" block (all libraries, no filters) that just works out
  of the box. Config page now shows only the Watch URLs (M3U/XMLTV/Stream) and a Regenerate button. A
  runtime fallback ensures any config that previously persisted an empty Blocks list still gets the
  default instead of staying permanently empty.
