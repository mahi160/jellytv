changelog: >
  Three fixes. (1) Schedule regeneration crashed on any Episode block whose library contains episodes
  without season/episode numbers or a series id (specials, extras, unmatched files) -- the Active
  Series cursor dereferenced those nulls, killing the whole regeneration and leaving an empty schedule
  (404 on Current, empty guide, dead stream). Such episodes are now excluded from the pool. (2) The
  default block ended at 23:59, leaving a nightly one-minute dead-air gap where nothing aired;
  StartTime == EndTime now means a full 24-hour block and the default is 00:00-00:00. (3) The config
  page's Copy buttons did nothing over plain http (navigator.clipboard requires a secure context) --
  added a fallback.
