changelog: >
  Fix: the plugin package didn't include a meta.json assembly whitelist, so Jellyfin's plugin loader
  fell back to loading every *.dll found anywhere under the plugin folder -- including bundled native
  SQLite binaries under runtimes/**/*.dll (e.g. runtimes/win-arm/native/e_sqlite3.dll), which are not
  managed assemblies. Loading any one of those throws BadImageFormatException and disables the entire
  plugin ("Malfunctioned"). The package now whitelists only the real managed assemblies via meta.json.
  Also includes 0.2.4.0's fixes: regenerating the schedule advanced each block's Active Series and
  inflated movie airing counts by a full schedule's worth every time, and cut off whatever was currently
  playing -- Active Series/Cooldown history is now committed from what actually aired, and the
  currently-playing program is preserved across regeneration. A full library query ran per scheduled
  program instead of once per block, and movie history was queried per candidate per pick instead of
  once per run -- both are now cached/batched. A DST spring-forward could crash regeneration; overlapping
  Programming Blocks are now rejected at validation; the XMLTV guide was missing whatever's airing right
  now. Security: manual Regenerate now requires elevated privileges; the config page no longer embeds the
  admin's session token in the M3U/XMLTV/Stream URLs. Config page: block fields are now shown/hidden
  based on content type and ordering.
