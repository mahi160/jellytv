changelog: >
  Fix: regenerating the schedule (daily task, library changes, config saves) advanced each block's
  Active Series and inflated movie airing counts by a full schedule's worth every time, and cut off
  whatever was currently playing. Active Series/Cooldown history is now committed from what actually
  aired, and the currently-playing program is preserved across regeneration. Fix: a full library query
  ran per scheduled program instead of once per block, and movie history was queried per candidate per
  pick instead of once per run -- both are now cached/batched. Fix: a DST spring-forward could crash
  regeneration; overlapping Programming Blocks are now rejected at validation instead of silently
  starving one of them; the XMLTV guide was missing whatever's airing right now. Security: manual
  Regenerate now requires elevated privileges; the config page no longer embeds the admin's session
  token in the M3U/XMLTV/Stream URLs (use a dedicated API key instead). Config page: block fields are
  now shown/hidden based on content type and ordering instead of all 14 always being visible.
