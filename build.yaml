changelog: >
  Security fix: FeedController (/Broadcast/m3u, /Broadcast/xmltv) and ChannelController
  (/Broadcast/Channel/Current, /Next, /Schedule, /Stream) had no [Authorize] attribute at all --
  Jellyfin has no FallbackPolicy configured, so endpoints without an explicit [Authorize] are fully
  anonymous by default (confirmed live against a real server: real data returned, no api_key, no 401).
  Added the standard [Authorize] attribute Jellyfin's own controllers use, so these now correctly
  require an authenticated user like every other Jellyfin API route. Existing M3U/XMLTV/Stream URLs
  (which already embed an api_key) are unaffected.
