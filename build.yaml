changelog: >
  Fix (actual root cause this time): the config page's <script> tag was a sibling AFTER the closing
  </div> of the page's data-role="page" container, not a descendant of it. Jellyfin's web client
  extracts content via querySelector('div[data-role="page"]') and only executes a script if it's
  inside that extracted subtree -- a sibling script is silently dropped and never runs, regardless of
  its own internal timing (which is why deferring to pageshow, running immediately, and polling all
  had zero effect in earlier releases). Moved the script inside the page div. Also includes 0.2.6.0's
  security fix: FeedController/ChannelController now require authentication (were fully anonymous).
