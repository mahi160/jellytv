changelog: >
  Fix: config page still had no styling and the Watch URL fields showed empty. Root cause: Jellyfin's
  plugin page loader only injects the page's <body> content into the dashboard SPA, so the previous
  fix's <style> tag (in <head>) never applied -- moved inside the body. Also, the custom 'pageshow'
  event Jellyfin fires on plugin pages doesn't reliably trigger on every dashboard version --
  initialization now runs immediately at script load (with a short retry poll) in addition to pageshow.
  Also includes 0.2.5.1/0.2.5.0's earlier fixes/simplification of this same config page.
