changelog: >
  Fix: plugin was disabled at startup because it referenced Jellyfin.Controller/Jellyfin.Model 10.11.11
  while the target server runs 10.11.8 -- Jellyfin's plugin loader binds these by exact assembly
  version with no redirects, so any mismatch disables the plugin. Now pinned to 10.11.8. Also fixed:
  bundled Windows-native e_sqlite3.dll (not a managed assembly, was crashing the loader) removed from
  the package; Microsoft.Data.Sqlite and its native SQLite deps are now bundled correctly. Also: config
  page now shows ready-to-copy M3U/XMLTV/Stream URLs (with API key included).
