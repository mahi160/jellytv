framework: "net9.0"
overview: "Turns your Jellyfin library into a single always-on TV channel"
description: >
  Jellyfin Broadcast generates a continuous programming schedule from your
  media library and exposes it as a live channel with M3U/XMLTV support.
category: "General"
owner: "jellytv"
artifacts:
- "Jellyfin.Plugin.Broadcast.dll"
- "Microsoft.Data.Sqlite.dll"
- "SQLitePCLRaw.core.dll"
- "SQLitePCLRaw.batteries_v2.dll"
- "SQLitePCLRaw.provider.e_sqlite3.dll"
- "runtimes/**"
changelog: >
  Fix: plugin was disabled at startup ("Malfunctioned") because Jellyfin's plugin loader recursively
  tries to load every *.dll under the plugin folder as a managed assembly, including the bundled
  Windows-native e_sqlite3.dll -- which isn't one. The Windows native SQLite binaries are no longer
  packaged (Linux/macOS natives use .so/.dylib and were never affected). Also: config page now shows
  ready-to-copy M3U/XMLTV/Stream URLs (with API key included) for adding the channel to Jellyfin's own
  Live TV.
